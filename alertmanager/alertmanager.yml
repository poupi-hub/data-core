global:
  resolve_timeout: 5m

route:
  receiver: operational-webhook
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Only alerts with channel=telegram go to Telegram.
    # These are the 5 critical-only alerts in critical_only.yml.
    - matchers:
        - channel = "telegram"
      receiver: telegram-critical
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 2h

receivers:
  - name: operational-webhook
    webhook_configs:
      - url: http://host.docker.internal:9099/alerts
        send_resolved: true

  - name: telegram-critical
    webhook_configs:
      - url: http://host.docker.internal:9099/alerts/telegram
        send_resolved: true
