global:
  resolve_timeout: 5m

route:
  receiver: operational-webhook
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: operational-webhook
    webhook_configs:
      - url: http://host.docker.internal:9099/alerts
        send_resolved: true
