# Telegram-first Alertmanager config template.
#
# Critical and warning alerts route to the Poupi System Bot by severity.
# operational-webhook remains the fallback receiver for non-warning/non-critical alerts.
# Render TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID from .env or the deployment secret store.

global:
  resolve_timeout: 5m

route:
  receiver: operational-webhook
  group_by: ["alertname", "service", "component", "runtime", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: poupi-system-bot-critical
      group_wait: 15s
      group_interval: 5m
      repeat_interval: 2h

    - matchers:
        - severity="warning"
      receiver: poupi-system-bot-warning
      group_wait: 2m
      group_interval: 30m
      repeat_interval: 6h

inhibit_rules:
  - source_matchers:
      - alertname=~"PoupiPostgresDown|PostgresDown"
    target_matchers:
      - component=~"runtime|scheduler|freshness|replay|queue|research"
    equal: ["service"]

  - source_matchers:
      - alertname=~"PoupiRedisDown|RedisDown|VolatileRedisDown"
    target_matchers:
      - component=~"runtime|scheduler|queue|freshness|research"
    equal: ["service"]

  - source_matchers:
      - alertname=~"DataCoreApiDown|PoupiShadowDataCoreApiDown"
    target_matchers:
      - service="data-core"
      - component=~"scheduler|freshness|queue|dataset|research|runtime|replay"
    equal: ["service"]

  - source_matchers:
      - alertname=~"SchedulerHeartbeatMissing|SchedulerHeartbeatDead|PoupiShadowSchedulerHeartbeatMissing"
    target_matchers:
      - component=~"freshness|queue|research|dataset|replay"
    equal: ["service"]

  - source_matchers:
      - alertname="MarketplaceStale"
    target_matchers:
      - alertname=~"BabyCoverageDrop|ProductLostMarketplace"
    equal: ["service"]

receivers:
  - name: operational-webhook
    webhook_configs:
      - url: http://host.docker.internal:9099/alerts
        send_resolved: true

  - name: poupi-system-bot-critical
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ template "poupi.telegram.message" . }}

  - name: poupi-system-bot-warning
    telegram_configs:
      - bot_token: "__TELEGRAM_BOT_TOKEN__"
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ template "poupi.telegram.message" . }}

templates:
  - /etc/alertmanager/templates/poupi_telegram.tmpl
