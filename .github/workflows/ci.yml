name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.6.8
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: data_core
          POSTGRES_USER: data_core
          POSTGRES_PASSWORD: data_core
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U data_core -d data_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://data_core:data_core@localhost:5433/data_core
      TEST_DATABASE_URL: postgresql+psycopg://data_core:data_core@localhost:5433/data_core
      APP_ENV: test
      AUTO_CREATE_TABLES: "true"
      SCHEDULER_ENABLED: "false"
      CACHE_ENABLED: "false"
      API_KEY_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q --tb=short
