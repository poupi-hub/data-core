global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/data-core-alerts.yml"
  - "/etc/prometheus/rules/data_core_scheduler_alerts.yml"
  - "/etc/prometheus/rules/pipeline_reliability_alerts.yml"

scrape_configs:
  - job_name: data-core-api
    static_configs:
      - targets: ["data-core-api:8000"]
    metrics_path: /metrics

  - job_name: poupi-baby-api
    static_configs:
      - targets: ["poupi-baby-api:3001"]
    metrics_path: /metrics
