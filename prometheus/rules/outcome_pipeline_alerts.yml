groups:
  - name: outcome-pipeline-health
    interval: 60s
    rules:
      - alert: OutcomePipelineStalled
        expr: >
          outcome_pipeline_health_score < 30
          and on() (outcome_bootstrap_phase == 0)
        for: 15m
        labels:
          severity: critical
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Outcome pipeline health critically degraded (score={{ $value | printf \"%.0f\" }}/100)"
          system: "Data Core / Outcome Pipeline"
          problem: "Outcome pipeline health is critically degraded."
          impact: "Research and calibration outcomes may become stale or unreliable."
          urgency: "CRITICA"
          action: "Check outcome job execution, pending backlog, candle availability, and evaluation errors."
          evidence: "outcome_pipeline_health_score = {{ $value | printf \"%.1f\" }}/100"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            The signal outcome evaluation pipeline has been degraded for 15+ minutes.
            Possible causes: outcome job not running, no candle data, or persistent
            evaluation errors.

      - alert: OutcomePipelineWarning
        expr: >
          outcome_pipeline_health_score < 60
          and on() (outcome_bootstrap_phase == 0)
        for: 30m
        labels:
          severity: warning
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Outcome pipeline health degraded (score={{ $value | printf \"%.0f\" }}/100)"
          system: "Data Core / Outcome Pipeline"
          problem: "Outcome pipeline health is below warning threshold."
          impact: "Outcome freshness may degrade if the condition persists."
          urgency: "MEDIA"
          action: "Check pending backlog and last evaluation timestamp."
          evidence: "outcome_pipeline_health_score = {{ $value | printf \"%.1f\" }}/100"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            Pipeline is running below healthy threshold. Check pending backlog
            and last evaluation timestamp.

      - alert: OutcomePendingBacklogHigh
        expr: >
          sum(outcome_pending_total) > 200
          and on() (outcome_bootstrap_phase == 0)
        for: 60m
        labels:
          severity: warning
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "High pending outcome backlog: {{ $value | printf \"%.0f\" }} signals"
          system: "Data Core / Outcome Pipeline"
          problem: "Pending outcome backlog is high."
          impact: "Research conclusions may lag because signals are not evaluated in time."
          urgency: "MEDIA"
          action: "Check outcome evaluator schedule, batch size, candle availability, and runtime lag."
          evidence: "sum(outcome_pending_total) = {{ $value | printf \"%.0f\" }}"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            More than 200 BUY/SELL signals are awaiting outcome evaluation.

      - alert: OutcomeJobNotRunning
        expr: >
          outcome_runtime_lag_seconds > 7200
          and on() (outcome_bootstrap_phase == 0)
          and sum(outcome_pending_total) > 0
        for: 10m
        labels:
          severity: critical
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Outcome tracker has not run in >2h with pending signals"
          system: "Data Core / Outcome Pipeline"
          problem: "Outcome tracker has not run for more than 2 hours while outcomes are pending."
          impact: "Outcome evaluation is stalled and research data will stop growing."
          urgency: "CRITICA"
          action: "Verify outcome job scheduling, worker logs, and candle feed availability."
          evidence: "outcome_runtime_lag_seconds = {{ $value | humanizeDuration }}"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            There are pending outcomes but the tracker is not evaluating them.

      - alert: OutcomeEvalErrorSpike
        expr: >
          rate(outcome_eval_error_total[30m]) > 0.1
          and on() (outcome_bootstrap_phase == 0)
        for: 0m
        labels:
          severity: warning
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Outcome evaluation error spike: {{ $labels.symbol }}/{{ $labels.timeframe }}"
          system: "Data Core / Outcome Pipeline"
          problem: "Outcome evaluator error rate spiked for {{ $labels.symbol }}/{{ $labels.timeframe }}."
          impact: "Outcomes for this symbol/timeframe may be incomplete or biased."
          urgency: "MEDIA"
          action: "Check candle data integrity, normalizer health, and evaluator logs."
          evidence: "rate(outcome_eval_error_total[30m]) = {{ $value | printf \"%.3f\" }}/s"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            More than 0.1 errors/s in the last 30 minutes.

      - alert: OutcomeFutureCandlesMissing
        expr: >
          increase(outcome_future_candles_missing_total[1h]) > 10
          and on() (outcome_bootstrap_phase == 0)
        for: 0m
        labels:
          severity: warning
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Outcome candle lookup failures: {{ $labels.symbol }}/{{ $labels.timeframe }}"
          system: "Data Core / Outcome Pipeline"
          problem: "Outcome evaluator cannot find enough future candles."
          impact: "Outcome rows may remain pending or be skipped."
          urgency: "MEDIA"
          action: "Check candle freshness, normalization lag, and symbol/timeframe coverage."
          evidence: "increase(outcome_future_candles_missing_total[1h]) = {{ $value | printf \"%.0f\" }}"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            Signals in the last hour found no subsequent candles for the symbol/timeframe.

  - name: outcome-pipeline-quant
    interval: 300s
    rules:
      - alert: OutcomeLowAccuracy
        expr: >
          outcome_accuracy_ratio < 0.35
          and on() (outcome_bootstrap_phase == 0)
        for: 30m
        labels:
          severity: warning
          service: data-core
          component: research
          layer: outcome_pipeline
        annotations:
          summary: "Low signal accuracy for {{ $labels.symbol }}/{{ $labels.timeframe }}/{{ $labels.signal }}"
          system: "Data Core / Research"
          problem: "Signal outcome accuracy is below 35% for a symbol/timeframe/signal slice."
          impact: "This slice may be unreliable, but conclusions require adequate sample size."
          urgency: "MEDIA"
          action: "Check calibration report and sample count before changing any strategy."
          evidence: "outcome_accuracy_ratio = {{ $value | printf \"%.1%%\" }}"
          dashboard: "Data Core / Outcome Pipeline"
          description: >
            Accuracy below 35% is sustained for 30+ minutes. Treat as advisory
            until sample size is confirmed.
