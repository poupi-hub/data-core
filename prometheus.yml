global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: data-core-api
    static_configs:
      - targets: ["data-core-api:8000"]
    metrics_path: /metrics

  # poupi-jobs-api REMOVIDO — projeto não existe (Phase D Fase 6).

  - job_name: poupi-crypto-api
    static_configs:
      - targets: ["poupi-crypto-api:8002"]
        labels:
          runtime_id: "main"
    metrics_path: /metrics

  # Volatile experimental runtime — isolated DB, dataset, Redis.
  # DRY_RUN=true hardcoded. Advisory-only. No live trading.
  - job_name: poupi-crypto-volatile
    static_configs:
      - targets: ["poupi-crypto-volatile:8003"]
        labels:
          runtime_id: "volatile"
    metrics_path: /metrics

  # poupi-baby usa alias "poupi-baby-backend" na rede compartilhada "poupi-monitoring".
  # Requer: docker network create poupi-monitoring (uma vez no servidor).
  - job_name: poupi-baby-backend
    static_configs:
      - targets: ["poupi-baby-backend:3001"]
    metrics_path: /metrics

  # poupi-baby-worker target intentionally disabled on 2026-05-26.
  # Evidence: no running poupi-baby worker container or poupi-monitoring alias exists;
  # old local compose worker was exited for 10 days. Re-enable only after the worker
  # is deployed and attached to poupi-monitoring with alias "poupi-baby-worker".
