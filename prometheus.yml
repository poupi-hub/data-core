global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: data-core-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Poupi-baby backend — runs on a separate compose network.
  # host.docker.internal resolves to the Docker host and works when poupi-baby
  # is started locally alongside data-core. Replace the target if both are on
  # a shared Docker network (e.g. "poupi-backend:3001").
  - job_name: poupi-baby-backend
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics
