global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: data-core-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # poupi-jobs-api REMOVIDO — projeto não existe (Phase D Fase 6).

  - job_name: poupi-crypto-api
    static_configs:
      - targets: ["poupi-crypto-api:8002"]
    metrics_path: /metrics

  # poupi-baby usa alias "poupi-baby-backend" na rede compartilhada "poupi-monitoring".
  # Requer: docker network create poupi-monitoring (uma vez no servidor).
  - job_name: poupi-baby-backend
    static_configs:
      - targets: ["poupi-baby-backend:3001"]
    metrics_path: /metrics

  # poupi-baby worker (BullMQ processor + notification queues).
  # Expõe /metrics e /healthz na porta 3002 via servidor HTTP nativo (Phase C Fase 5).
  - job_name: poupi-baby-worker
    static_configs:
      - targets: ["poupi-baby-worker:3002"]
    metrics_path: /metrics
